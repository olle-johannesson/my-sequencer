<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Looper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="hold">

      <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
      >
        <!-- Headphone arch -->
        <path d="M4 14v-2a8 8 0 0 1 16 0v2" />

        <!-- Earcups (scaled down so they don’t crowd the mic) -->
        <rect x="4.5" y="11.8" width="3" height="7.5" rx="1.6" />
        <rect x="16.5" y="11.8" width="3" height="7.5" rx="1.6" />

        <!-- Microphone capsule -->
        <rect x="9" y="9" width="6" height="9" rx="3" />

        <!-- Mic grille -->
        <line x1="10" y1="11"   x2="14" y2="11" />
        <line x1="10" y1="13"   x2="14" y2="13" />
        <line x1="10" y1="15"   x2="14" y2="15" />

        <!-- Mic top bars -->
        <line x1="11" y1="9.7" x2="11" y2="10.5" />
        <line x1="12" y1="9.7" x2="12" y2="10.5" />
        <line x1="13" y1="9.7" x2="13" y2="10.5" />

        <!-- Stand -->
        <line x1="12" y1="18" x2="12" y2="20" />

        <!-- Base bar -->
        <path d="M10 20h4" />

        <!-- Foot -->
        <path d="M9 21.5h6a2 2 0 0 1 2 2H7a2 2 0 0 1 2-2z" />
      </svg>

      <svg class="mic-star star1" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star star2" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star star3" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star star4" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star star5" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

    </button>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
