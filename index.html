<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Looper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="checkbox" id="audio-toggle" style="display: none;">

    <label for="audio-toggle" id="hold" class="">

      <!-- Frequency blob background -->
      <svg id="freq-blob" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <path id="blob-path" d="M 150.0 80.0 L 157.3 80.4 L 164.6 81.5 L 171.6 83.4 L 178.5 86.1 L 185.0 89.4 L 191.1 93.4 L 196.8 98.0 L 202.0 103.2 L 206.6 108.9 L 210.6 115.0 L 213.9 121.5 L 216.6 128.4 L 218.5 135.4 L 219.6 142.7 L 220.0 150.0 L 219.6 157.3 L 218.5 164.6 L 216.6 171.6 L 213.9 178.5 L 210.6 185.0 L 206.6 191.1 L 202.0 196.8 L 196.8 202.0 L 191.1 206.6 L 185.0 210.6 L 178.5 213.9 L 171.6 216.6 L 164.6 218.5 L 157.3 219.6 L 150.0 220.0 L 142.7 219.6 L 135.4 218.5 L 128.4 216.6 L 121.5 213.9 L 115.0 210.6 L 108.9 206.6 L 103.2 202.0 L 98.0 196.8 L 93.4 191.1 L 89.4 185.0 L 86.1 178.5 L 83.4 171.6 L 81.5 164.6 L 80.4 157.3 L 80.0 150.0 L 80.4 142.7 L 81.5 135.4 L 83.4 128.4 L 86.1 121.5 L 89.4 115.0 L 93.4 108.9 L 98.0 103.2 L 103.2 98.0 L 108.9 93.4 L 115.0 89.4 L 121.5 86.1 L 128.4 83.4 L 135.4 81.5 L 142.7 80.4 Z" fill="var(--button-color)"/>
      </svg>

      <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
      >
        <!-- Headphone arch -->
        <path d="M4 14v-2a8 8 0 0 1 16 0v2" />

        <!-- Earcups -->
        <rect x="4.5" y="11.8" width="3" height="7.5" rx="1.6" />
        <rect x="16.5" y="11.8" width="3" height="7.5" rx="1.6" />

        <!-- Microphone capsule -->
        <rect x="9" y="9" width="6" height="9" rx="3" />

        <!-- Mic grille -->
        <line x1="10" y1="11"   x2="14" y2="11" />
        <line x1="10" y1="13"   x2="14" y2="13" />
        <line x1="10" y1="15"   x2="14" y2="15" />

        <!-- Mic top bars -->
        <line x1="11" y1="9.7" x2="11" y2="10.5" />
        <line x1="12" y1="9.7" x2="12" y2="10.5" />
        <line x1="13" y1="9.7" x2="13" y2="10.5" />

        <!-- Stand -->
        <line x1="12" y1="18" x2="12" y2="20" />

        <!-- Base bar -->
        <path d="M10 20h4" />

        <!-- Foot -->
        <path d="M9 21.5h6a2 2 0 0 1 2 2H7a2 2 0 0 1 2-2z" />
      </svg>

      <svg class="mic-star mic-star-1" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star mic-star-2" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star mic-star-3" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star mic-star-4" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <svg class="mic-star mic-star-5" viewBox="0 0 16 16">
        <path d="M8 1.5 L9.2 4.2 L12 5 L9.2 5.8 L8 8.5 L6.8 5.8 L4 5 L6.8 4.2 Z"/>
      </svg>

      <div class="ripple-circles">
        <div id="ripple-circle-1" class="ripple-circle ripple-circle-1"></div>
        <div id="ripple-circle-2" class="ripple-circle ripple-circle-2"></div>
        <div id="ripple-circle-3" class="ripple-circle ripple-circle-3"></div>
      </div>

    </label>

    <div id="fx">
      <button id="crunch">crunch</button>
      <button id="lofi">lofi</button>
      <button id="distort">distort</button>

      <button id="dub">dub</button>
      <button id="slapback">slapback</button>

      <button id="lpWobble">lpWobble</button>
      <button id="bandDrift">bandDrift</button>

      <button id="stutter16">stutter16</button>
      <button id="tripletish">tripletish</button>

      <button id="repeat1">repeat1</button>
      <button id="repeat2">repeat2</button>
      <button id="reverse">reverse</button>

      <button id="semitoneUp">semitone+</button>
      <button id="semitoneDown">semitone-</button>
      <button id="vibrato">vibrato</button>

      <button id="medium">medium</button>
      <button id="small">small</button>
    </div>

    <script src="../node_modules/eruda/eruda.js"></script>
    <script>eruda.init();</script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
